name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Native tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: oven-sh/setup-bun@v2
      - name: Install Native SDK CLI
        run: npm install -g @native-sdk/cli
      - name: Markup + unit tests
        run: |
          native check
          native test
      - name: Bun compress tests
        run: bun test scripts/compress.test.ts
